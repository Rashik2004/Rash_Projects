<!DOCTYPE html>
<html lang="en" class="transition-colors duration-300">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Resume Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
      };
    </script>
  </head>
  <body class="bg-gray-100 dark:bg-gray-900 dark:text-white transition-colors duration-300">
    <div class="min-h-screen flex items-center justify-center">
      <div class="relative w-full max-w-md p-8 bg-white/30 dark:bg-gray-800/30 backdrop-blur-lg rounded-2xl shadow-xl animate-fade-in">
        <h2 class="text-3xl font-semibold text-center text-blue-700 dark:text-blue-400 mb-6">Login</h2>
        <form class="space-y-4">
          <div>
            <label class="block text-sm mb-1" for="email">Email</label>
            <input id="email" type="email" class="w-full px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required />
          </div>
          <div>
            <label class="block text-sm mb-1" for="password">Password</label>
            <input id="password" type="password" class="w-full px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required />
          </div>
          <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-semibold transition">Login</button>
        </form>
        <p class="text-sm text-center text-gray-600 dark:text-gray-300 mt-4">
          Don't have an account? <a href="signup.html" class="text-blue-600 dark:text-blue-400 hover:underline">Sign up</a>
        </p>
      </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>AOS.init();</script>
  </body>
</html>
